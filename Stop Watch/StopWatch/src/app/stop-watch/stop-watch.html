<div class="text-center mt-10">
  <h1 class="text-4xl font-bold">{{ time() }}s</h1>
  <div class="mt-4 flex justify-center gap-3">
    <button class="bg-green-500 px-4 py-2 text-white cursor-pointer" (click)="start()">
      Start
    </button>
    <button class="bg-red-500 px-4 py-2 text-white cursor-pointer" (click)="stop()">Stop</button>
    <button class="bg-blue-500 px-4 py-2 text-white cursor-pointer" (click)="reset()">Reset</button>
  </div>
</div>
